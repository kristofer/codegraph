name: Go CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

defaults:
  run:
    working-directory: go

jobs:
  # ─── Build & Test ───────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
          - os: ubuntu-latest
            goarch: arm64
          - os: macos-latest
            goarch: amd64
          - os: macos-latest
            goarch: arm64
          - os: windows-latest
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

      # Run tests only on the native architecture to avoid QEMU overhead in CI.
      - name: Test (with race detector)
        if: matrix.goarch == 'amd64' || (matrix.os == 'macos-latest' && matrix.goarch == 'arm64')
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.goarch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: go/coverage.out

  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go

  # ─── Release binaries ───────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go/go.sum

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUT="codegraph-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "${OUT}" ./cmd/codegraph
          echo "ARTIFACT=${OUT}" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: go/${{ env.ARTIFACT }}
